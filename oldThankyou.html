<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - School of Grant Success</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .thankyou-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, var(--sgs-green-1), var(--sgs-green-2));
        }

        .thankyou-box {
            background-color: var(--sgs-white);
            max-width: 700px;
            width: 100%;
            padding: 60px 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .thankyou-icon {
            width: 100px;
            height: 100px;
            background-color: var(--sgs-green-1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 3rem;
        }

        .thankyou-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--gray-dark);
            margin-bottom: 20px;
        }

        .thankyou-subtitle {
            font-size: 1.2rem;
            color: var(--gray-medium);
            margin-bottom: 40px;
            line-height: 1.7;
        }

        .payment-buttons {
            display: grid;
            gap: 20px;
            margin-bottom: 30px;
        }

        .btn-payment {
            padding: 20px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-payment:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .btn-one-time {
            background-color: var(--sgs-green-1);
            color: var(--sgs-white);
            border: 3px solid var(--sgs-yellow);
        }

        .btn-two-payment {
            background-color: var(--sgs-green-2);
            color: var(--sgs-white);
        }

        .btn-three-payment {
            background-color: var(--sgs-green-3);
            color: var(--gray-dark);
        }

        .btn-whatsapp {
            background-color: #25D366;
            color: var(--sgs-white);
        }

        .payment-badge {
            background-color: var(--sgs-yellow);
            color: var(--gray-dark);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 800;
        }
    </style>
</head>
<body>
    <div class="thankyou-container">
        <div class="thankyou-box">
            <div class="thankyou-icon">✓</div>
            <h1 class="thankyou-title">Thank You For Registering!</h1>
            <p class="thankyou-subtitle">
                You're one step closer to winning grants for your business. 
                Complete your payment now to secure your spot in the next cohort. 
                Limited spaces available!
            </p>

            <div class="payment-buttons">
                <button class="btn-payment btn-one-time" id="btnOneTime">
                    <span>One-Time Payment</span>
                    <span>
                        <span class="payment-badge">BEST VALUE</span>
                        ₦55,000
                    </span>
                </button>

                <button class="btn-payment btn-two-payment" id="btnTwoPayment">
                    <span>2 Installments</span>
                    <span>₦60,000</span>
                </button>

                <button class="btn-payment btn-three-payment" id="btnThreePayment">
                    <span>3 Installments</span>
                    <span>₦65,000</span>
                </button>

                <button class="btn-payment btn-whatsapp" id="btnWhatsApp">
                    <span>Join WhatsApp Student Group</span>
                    <span>FREE</span>
                </button>
            </div>

            <p style="color: var(--gray-medium); font-size: 0.9rem;">
                Need help? WhatsApp us at +2347045108885
            </p>
        </div>
    </div>

    <script>
        // PASTE YOUR SELAR LINKS HERE
        const SELAR_ONE_TIME = "PASTE_LINK";
        const SELAR_TWO_PAYMENT = "PASTE_LINK";
        const SELAR_THREE_PAYMENT = "PASTE_LINK";
        const WHATSAPP_GROUP = "PASTE_LINK";

        document.getElementById('btnOneTime').addEventListener('click', () => {
            window.location.href = SELAR_ONE_TIME;
        });

        document.getElementById('btnTwoPayment').addEventListener('click', () => {
            window.location.href = SELAR_TWO_PAYMENT;
        });

        document.getElementById('btnThreePayment').addEventListener('click', () => {
            window.location.href = SELAR_THREE_PAYMENT;
        });

        document.getElementById('btnWhatsApp').addEventListener('click', () => {
            window.open(WHATSAPP_GROUP, '_blank');
        });
    </script>
</body>
</html>
